# ============================================================================
# Project Configuration — Lecture 4 (Devicetree Overlay + Kconfig)
# ============================================================================
# This file overrides default values defined in the application Kconfig
# (app/Kconfig) and in Zephyr's own Kconfig tree.
# ============================================================================

# ---------------------------------------------------------------------------
# Zephyr base requirements
# ---------------------------------------------------------------------------
CONFIG_GPIO=y
CONFIG_LOG=y

# ---------------------------------------------------------------------------
# Heartbeat period (ms)
# Default in Kconfig is 500; range enforced: 100 .. 2000 ms.
# Change this value and rebuild to verify the LED blink speed changes.
# ---------------------------------------------------------------------------
CONFIG_APP_HEARTBEAT_PERIOD_MS=500
